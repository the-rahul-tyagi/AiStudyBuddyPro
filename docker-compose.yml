services:
  ai-study-buddy-app:
    build: .
    container_name: ai-study-buddy-container

    ports:
      - "8501:8501"

    env_file:
      - .env

    restart: always

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus
    container_name: prometheus-container

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    restart: always

  grafana:
    image: grafana/grafana
    container_name: grafana-container

    ports:
      - "3000:3000"

    restart: always

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-container
    privileged: true
    user: root

    ports:
      - "8081:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home

    restart: always

volumes:
  jenkins_home:

