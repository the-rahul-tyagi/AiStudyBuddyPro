version: '3.9'

services:

  ai-study-buddy-app:
    container_name: ai-study-buddy-container

    build:
      context: .
      dockerfile: Dockerfile

    image: rahultyagi/ai-study-buddy-pro:latest

    ports:
      - "8501:8501"

    env_file:
      - .env

    restart: unless-stopped

    volumes:
      - ./:/app

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - ai-study-buddy-network

networks:
  ai-study-buddy-network:
    driver: bridge